<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0a0a12" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Hand Slice — Fruit Ninja CV</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <div id="start-screen" class="screen">
        <h1>Hand Slice</h1>
        <p class="subtitle">Slice fruit with your index finger — webcam required</p>
        <ul class="tips">
          <li>Show your <strong>full hand</strong> first</li>
          <li>Then <strong>point index finger</strong> to start</li>
          <li>Good lighting helps tracking</li>
        </ul>
        <button id="start-btn" type="button">Tap to start camera</button>
        <p id="start-error" class="error hidden"></p>
      </div>

      <div id="loading-screen" class="screen hidden">
        <div class="spinner"></div>
        <p>Loading hand tracking…</p>
      </div>

      <div id="game-screen" class="screen hidden">
        <video id="video" playsinline muted autoplay></video>
        <canvas id="canvas"></canvas>
        <div id="hud">
          <div id="score">Score: 0</div>
          <div id="combo" class="hidden"></div>
        </div>

        <div id="calibrate-panel" class="calibrate-panel hidden">
          <p id="calibrate-title">Show your full hand</p>
          <p id="calibrate-hint">Keep your whole hand inside the frame</p>
          <div class="progress-track">
            <div id="calibrate-progress" class="progress-fill"></div>
          </div>
        </div>

        <div id="go-flash" class="go-flash hidden">Slice!</div>

        <button id="restart-btn" type="button" class="fab-restart hidden" title="Recalibrate">
          ↺
        </button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
